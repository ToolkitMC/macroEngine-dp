name: Issue Logic Bug Detector (Return)

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  detect-return-logic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # script dosyasını garantili almak için

      - name: Detect return-related logic bugs
        uses: actions/github-script@v7   # v7 şu an en stabil, Node 24’e geçiş yapıyoruz
        with:
          script: |
            const script = require('./.github/scripts/detect-return-logic.js');
            await script({ github, context });
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node 20 uyarısını bastırmak için
